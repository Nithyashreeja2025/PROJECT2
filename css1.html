<body>

<div style="width:300px; margin:auto; background-color:blue; padding:20px; border-radius:8px;">
    
    <form onsubmit="return checkLogin()">
        <h3>Student Login</h3>

        <input type="text" id="user" placeholder="Student ID"><br><br>
        <input type="password" id="pass" placeholder="Password"><br><br>

        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>

</div>

<script>
function checkLogin()
{
    var u = document.getElementById("user").value;
    var p = document.getElementById("pass").value;

    if(u == "student" && p == "1234")
    {
        document.getElementById("msg").innerText = "Login Successful";
    }
    else
    {
        document.getElementById("msg").innerText = "Invalid Username or Password";
    }

    return false;
}
</script>

</body>
